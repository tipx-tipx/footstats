name: FootStats — cykl zbierania danych

# Darmowy cron w chmurze (GitHub Actions). Uruchamia pipeline i wypycha wyniki
# do Supabase. Aplikacja na Vercel czyta z Supabase — nic nie musi być włączone
# na komputerze użytkownika.
#
# Repo jest PUBLICZNE = nielimitowane minuty Actions, więc częstotliwość nie jest
# ograniczona minutami. GitHub dopuszcza minimum co 5 min; trzymamy 15 min, żeby
# nie prowokować rate-limitów/blokad po stronie źródeł (Sofascore/365/Superbet).
# Cron GitHuba jest best-effort (bywa opóźniany); najpilniejsza ścieżka — nowy
# kupon po pominięciu — i tak odpala pipeline od razu (workflow_dispatch z API).

on:
  schedule:
    - cron: "*/15 * * * *"   # co 15 min (UTC)
  workflow_dispatch: {}       # pozwala uruchomić ręcznie z zakładki Actions

concurrency:
  group: footstats-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalacja zależności
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Przelicz okazje i wypchnij do Supabase
        working-directory: pipeline
        env:
          PYTHONIOENCODING: utf-8
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m footstats.jobs.cycle
