name: FootStats — cykl zbierania danych

# Darmowy cron w chmurze (GitHub Actions). Uruchamia pipeline i wypycha wyniki
# do Supabase. Aplikacja na Vercel czyta z Supabase — nic nie musi być włączone
# na komputerze użytkownika.
#
# Uwaga: publiczne repo = nielimitowane minuty Actions. Prywatne = 2000 min/mc;
# cykl trwa <1 min, więc co 30 min ≈ 1450 min/mc — mieści się w limicie.
# Częściej (co 30 min zamiast godziny), żeby łapać ogłoszone składy przed meczem.

on:
  schedule:
    - cron: "*/30 * * * *"   # co 30 min (UTC)
  workflow_dispatch: {}       # pozwala uruchomić ręcznie z zakładki Actions

concurrency:
  group: footstats-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalacja zależności
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Przelicz okazje i wypchnij do Supabase
        working-directory: pipeline
        env:
          PYTHONIOENCODING: utf-8
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m footstats.jobs.cycle
