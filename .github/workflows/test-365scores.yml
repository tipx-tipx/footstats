name: Test — 365Scores z chmury

# Jednorazowy test: czy webws.365scores.com odpowiada z IP GitHub Actions
# (Sofascore blokuje serwerownie — sprawdzamy alternatywę). Do usunięcia po teście.

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test 365Scores
        run: |
          pip install curl_cffi --quiet
          python - <<'EOF'
          from curl_cffi import requests
          url = ("https://webws.365scores.com/web/games/current/?appTypeId=5&langId=1"
                 "&timezoneName=Europe/Warsaw&userCountryId=1&sports=1")
          r = requests.get(url, impersonate="chrome124", timeout=25)
          print("games/current:", r.status_code, "| meczów:", len(r.json().get("games", [])))
          gid = r.json()["games"][0]["id"]
          r2 = requests.get(f"https://webws.365scores.com/web/game/?appTypeId=5&langId=1"
                            f"&timezoneName=Europe/Warsaw&userCountryId=1&gameId={gid}",
                            impersonate="chrome124", timeout=25)
          g = r2.json().get("game", {})
          print("game:", r2.status_code, "| hasShotChart:", g.get("hasShotChart"),
                "| chartEvents:", len((g.get("chartEvents") or {}).get("events", [])))
          EOF
